name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION"
            exit 1
          fi
      - name: Generate release notes
        shell: bash
        run: node scripts/extract-release-notes.mjs "$GITHUB_REF_NAME" > release-notes.md
      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build-windows:
    needs: validate-version
    runs-on: windows-latest
    env:
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify Windows signing secrets
        if: env.WIN_CSC_LINK != ''
        run: node scripts/require-windows-signing-env.mjs
      - run: npm run download:binaries:current
      - run: npm run build
      - run: node scripts/patch-electron-builder-nsis.mjs
      - run: npx electron-builder --win --publish never
      - if: env.WIN_CSC_LINK != ''
        run: npm run verify:win-signing
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error

  build-linux:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Linux smoke test dependencies
        run: |
          sudo apt-get update
          ALSA_PACKAGE=libasound2
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            ALSA_PACKAGE=libasound2t64
          fi
          sudo apt-get install -y unzip xvfb libnss3 libgtk-3-0 libxss1 "$ALSA_PACKAGE" libatk-bridge2.0-0 libgbm1
      - run: npm ci
      - run: npm run download:binaries:current
      - run: npm run build:linux
      - run: npm run verify:linux:package
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: |
            dist/*.AppImage
            dist/latest-linux.yml
          if-no-files-found: error

  build-macos-arm64:
    needs: validate-version
    runs-on: macos-15
    timeout-minutes: 360
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      DEBUG: electron-osx-sign*
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Write App Store Connect API key
        shell: bash
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          cat > "$KEY_PATH" <<'EOF'
          ${{ secrets.APPLE_API_KEY_P8 }}
          EOF
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run download:binaries:current
      - run: npm run build
      - run: node scripts/build-mac-release.mjs --arch arm64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-release-assets
          path: |
            dist/*-mac-arm64.dmg
            dist/*-mac-arm64.zip
            dist/*-mac-arm64.zip.blockmap
            dist/latest-arm64-mac.yml
          if-no-files-found: error

  build-macos-x64:
    needs: validate-version
    runs-on: macos-15-intel
    timeout-minutes: 360
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      DEBUG: electron-osx-sign*
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Write App Store Connect API key
        shell: bash
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          cat > "$KEY_PATH" <<'EOF'
          ${{ secrets.APPLE_API_KEY_P8 }}
          EOF
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run download:binaries:current
      - run: npm run build
      - run: node scripts/build-mac-release.mjs --arch x64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64-release-assets
          path: |
            dist/*-mac-x64.dmg
            dist/*-mac-x64.zip
            dist/*-mac-x64.zip.blockmap
            dist/latest-x64-mac.yml
          if-no-files-found: error

  publish-release:
    needs:
      - build-windows
      - build-linux
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-context
      - uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: release-assets/windows
      - uses: actions/download-artifact@v4
        with:
          name: linux-release-assets
          path: release-assets/linux
      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64-release-assets
          path: release-assets/macos-arm64
      - uses: actions/download-artifact@v4
        with:
          name: macos-x64-release-assets
          path: release-assets/macos-x64
      - name: Publish release artifacts
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GH_REPO" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --repo "$GH_REPO" --title "$GITHUB_REF_NAME" --notes-file release-context/release-notes.md
          gh release edit "$GITHUB_REF_NAME" --repo "$GH_REPO" --title "$GITHUB_REF_NAME" --notes-file release-context/release-notes.md
          gh release upload "$GITHUB_REF_NAME" --repo "$GH_REPO" \
            release-assets/windows/*.exe \
            release-assets/windows/*.blockmap \
            release-assets/windows/latest.yml \
            release-assets/linux/*.AppImage \
            release-assets/linux/latest-linux.yml \
            release-assets/macos-arm64/*-mac-arm64.dmg \
            release-assets/macos-arm64/*-mac-arm64.zip \
            release-assets/macos-arm64/*-mac-arm64.zip.blockmap \
            release-assets/macos-arm64/latest-arm64-mac.yml \
            release-assets/macos-x64/*-mac-x64.dmg \
            release-assets/macos-x64/*-mac-x64.zip \
            release-assets/macos-x64/*-mac-x64.zip.blockmap \
            release-assets/macos-x64/latest-x64-mac.yml \
            --clobber
