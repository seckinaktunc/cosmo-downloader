appId: com.seckinaktunc.cosmodownloader
productName: Cosmo Downloader
compression: maximum
electronLanguages:
  - en-US
  - tr
  - zh-CN
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!.claude/**/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,README.md,LICENSE}'
  - '!docs/**/*'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!tests/**/*'
  - '!scripts/**/*'
  - '!vitest.config.ts'
  - '!**/*.tsbuildinfo'
  - '!**/*.map'
  - '!resources/bin/**/*'
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - '**/*'
win:
  icon: icon.ico
  executableName: Cosmo Downloader
  target:
    - nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  license: build/license.txt
  createDesktopShortcut: false
  createStartMenuShortcut: false
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/installerSidebar.bmp
mac:
  icon: icon.icns
  target:
    - dmg
    - zip
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  icon: icon.png
  target:
    - AppImage
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: seckinaktunc
  repo: cosmo-downloader
  releaseType: release
